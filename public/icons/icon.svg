<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="60%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bg)"/>

  <!-- Sparkle shape — four-pointed star with small diamond accents -->
  <g fill="white" transform="translate(256,256)">
    <!-- Main four-pointed star -->
    <path d="M0,-120 C12,-40 40,-12 120,0 C40,12 12,40 0,120 C-12,40 -40,12 -120,0 C-40,-12 -12,-40 0,-120Z" opacity="0.95"/>
    <!-- Small accent sparkle top-right -->
    <path d="M0,-28 C3,-10 10,-3 28,0 C10,3 3,10 0,28 C-3,10 -10,3 -28,0 C-10,-3 -3,-10 0,-28Z"
          transform="translate(100,-100) scale(0.5)" opacity="0.7"/>
    <!-- Small accent sparkle bottom-left -->
    <path d="M0,-28 C3,-10 10,-3 28,0 C10,3 3,10 0,28 C-3,10 -10,3 -28,0 C-10,-3 -3,-10 0,-28Z"
          transform="translate(-80,90) scale(0.35)" opacity="0.5"/>
  </g>
</svg>
